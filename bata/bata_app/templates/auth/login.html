{% extends 'layout/publiclayout.html' %}

{% block title %}
Login - Bata
{% endblock %}

{% block content %}
<div class="w-full bg-[#f9fafb] min-h-[80vh] border-y-[40px] px-0 border-transparent flex items-center justify-center">
    <div class="max-w-[500px] w-full border-x-[15px] md:border-x-[30px] border-transparent">
        
        <div class="bg-white border-[1px] border-gray-200 shadow-sm rounded-sm">
            <div class="border-[30px] md:border-[40px] border-transparent">
                
                <h1 class="text-2xl md:text-3xl font-black text-gray-900 uppercase tracking-widest mb-[10px] text-center">Welcome Back</h1>
                <p class="text-xs text-gray-500 font-medium text-center mb-[30px]">Enter your credentials to access your account.</p>
                
                {% if error %}
                <div class="bg-red-50 border-[1px] border-red-200 text-red-600 text-xs font-bold p-[10px] rounded-sm mb-[20px] text-center">
                    {{ error }}
                </div>
                {% endif %}
                
                <form method="POST" action="{% url 'login_view' %}" class="flex flex-col gap-[20px]">
                    {% csrf_token %}
                    
                    <div class="flex flex-col gap-[5px]">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Username</label>
                        <div class="border-[1px] border-gray-300 rounded-sm bg-white focus-within:border-red-600 transition-colors flex items-stretch">
                            <input type="text" name="username" class="w-full bg-transparent outline-none text-gray-800 text-sm font-medium border-y-[12px] border-x-[15px] border-transparent" required>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-[5px]">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Password</label>
                            <a href="#" class="text-[9px] font-bold text-gray-400 hover:text-red-600 uppercase tracking-widest transition-colors">Forgot Password?</a>
                        </div>
                        <div class="border-[1px] border-gray-300 rounded-sm bg-white focus-within:border-red-600 transition-colors flex items-stretch">
                            <input type="password" name="password" class="w-full bg-transparent outline-none text-gray-800 text-sm font-medium border-y-[12px] border-x-[15px] border-transparent" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full mt-[10px] bg-red-600 text-white font-black uppercase tracking-widest text-xs border-[1px] border-red-600 hover:bg-white hover:text-red-600 transition-colors rounded-sm shadow-sm flex justify-center items-center">
                        <span class="border-y-[15px] border-transparent block">Login to Account</span>
                    </button>
                    
                </form>
                
                <div class="mt-[30px] pt-[20px] border-t-[1px] border-gray-100 text-center">
                    <p class="text-[11px] font-medium text-gray-500">Don't have an account? <a href="{% url 'signup_view' %}" class="font-bold text-gray-900 hover:text-red-600 uppercase tracking-widest ml-[5px] transition-colors">Create one</a></p>
                </div>
                
            </div>
        </div>

    </div>
</div>
{% endblock %}
