{% extends 'layout/adminlayout.html' %}

{% block title %}
    {% if color %}Edit Color{% else %}New Color{% endif %} - Bata Admin
{% endblock %}

{% block page_title %}
    {% if color %}Edit Color{% else %}New Color{% endif %}
{% endblock %}

{% block content %}
<div class="max-w-xl">
    <div class="bg-white border-[1px] border-gray-200 rounded-sm shadow-sm">
        <form method="POST" class="border-[25px] border-transparent flex flex-col gap-[20px]">
            {% csrf_token %}
            
            <div class="flex flex-col gap-[7px]">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Color Name</label>
                <div class="border-[1px] border-gray-300 rounded-sm bg-white focus-within:border-red-600 transition-colors flex items-stretch">
                    <input type="text" name="name" value="{{ color.name|default:'' }}" class="w-full bg-transparent outline-none text-gray-800 text-sm font-medium border-y-[12px] border-x-[15px] border-transparent" required>
                </div>
            </div>

            <div class="flex flex-col gap-[7px]">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Hex Code (e.g., #FF0000) (Optional)</label>
                <div class="border-[1px] border-gray-300 rounded-sm bg-white focus-within:border-red-600 transition-colors flex items-stretch">
                    <input type="text" name="hex_code" value="{{ color.hex_code|default:'' }}" class="w-full bg-transparent outline-none text-gray-800 text-sm font-medium border-y-[12px] border-x-[15px] border-transparent">
                </div>
            </div>

            <div class="mt-[10px] pt-[20px] border-t-[1px] border-gray-100 flex justify-end gap-[10px]">
                <a href="{% url 'admin_colors' %}" class="bg-gray-100 text-gray-600 font-bold uppercase text-[10px] tracking-widest px-[20px] py-[10px] rounded-sm hover:bg-gray-200 transition-colors">Cancel</a>
                <button type="submit" class="bg-red-600 text-white font-bold uppercase text-[10px] tracking-widest px-[25px] py-[10px] rounded-sm hover:bg-red-700 transition-colors shadow-sm">Save Color</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
