{% extends 'layout/adminlayout.html' %}

{% block title %}Dashboard - Bata Admin{% endblock %}
{% block page_title %}Overview{% endblock %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-[20px]">
    
    <!-- Stat Card 1 -->
    <div class="bg-white border-[1px] border-gray-200 rounded-sm shadow-sm flex flex-col items-center justify-center py-[40px]">
        <div class="w-[50px] h-[50px] rounded-full bg-red-50 flex items-center justify-center text-red-600 mb-[15px]">
            <i class="fas fa-list text-xl"></i>
        </div>
        <h3 class="text-3xl font-black text-gray-900 leading-none">{{ categories_count }}</h3>
        <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mt-[5px]">Total Categories</p>
    </div>

    <!-- Stat Card 2 -->
    <div class="bg-white border-[1px] border-gray-200 rounded-sm shadow-sm flex flex-col items-center justify-center py-[40px]">
        <div class="w-[50px] h-[50px] rounded-full bg-blue-50 flex items-center justify-center text-blue-600 mb-[15px]">
            <i class="fas fa-shoe-prints text-xl"></i>
        </div>
        <h3 class="text-3xl font-black text-gray-900 leading-none">{{ products_count }}</h3>
        <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mt-[5px]">Total Products</p>
    </div>
    
    <!-- Quick Actions -->
    <div class="bg-white border-[1px] border-gray-200 rounded-sm shadow-sm p-[20px] flex flex-col justify-center">
        <h3 class="text-[10px] uppercase font-bold tracking-widest text-gray-400 mb-[15px]">Quick Actions</h3>
        <div class="flex flex-col gap-[10px]">
            <a href="{% url 'admin_category_create' %}" class="bg-gray-50 border-[1px] border-gray-200 hover:border-red-600 hover:text-red-600 transition-colors text-xs font-bold uppercase tracking-widest text-gray-600 rounded-sm flex items-center justify-center py-[10px]">
                <i class="fas fa-plus mr-[5px]"></i> New Category
            </a>
            <a href="{% url 'admin_product_create' %}" class="bg-red-600 text-white hover:bg-white hover:text-red-600 border-[1px] border-red-600 transition-colors text-xs font-bold uppercase tracking-widest rounded-sm flex items-center justify-center py-[10px] shadow-sm">
                <i class="fas fa-plus mr-[5px]"></i> New Product
            </a>
        </div>
    </div>

</div>
{% endblock %}
