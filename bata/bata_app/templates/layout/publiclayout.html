<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bata{% endblock %}</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0 !important;
            padding: 0 !important;
            overflow-x: hidden;
            * { padding: 0 !important; }
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-800 min-h-screen flex flex-col w-full relative">

    <!-- Top minimal accent bar -->
    <div class="w-full bg-red-600 h-[3px] fixed top-0 z-[60]"></div>

    <!-- HEADER (Sticky & Sleek) -->
    <header class="flex flex-row border-b-[1px] border-gray-100 bg-white items-stretch w-full sticky top-[3px] z-[50] shadow-sm">
        <!-- Logo -->
        <a href="/" class="text-2xl font-black text-red-600 tracking-[2px] uppercase flex justify-center items-center border-y-[15px] border-x-[15px] md:border-x-[30px] border-transparent w-auto hover:opacity-80 transition-opacity">
            BATA
        </a>
        
        <!-- Navigation (Desktop) -->
        <nav class="hidden md:flex flex-row grow items-stretch justify-start bg-white ml-[20px]">
            <a href="/" class="flex items-center text-gray-600 font-semibold text-sm tracking-wide transition-colors duration-200 hover:text-red-600 border-[20px] border-x-[15px] border-transparent relative group">
                Home
                <span class="absolute bottom-[10px] left-[15px] right-[15px] h-[2px] bg-red-600 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></span>
            </a>
            <a href="/search" class="flex items-center text-gray-600 font-semibold text-sm tracking-wide transition-colors duration-200 hover:text-red-600 border-[20px] border-x-[15px] border-transparent relative group">
                Search
                <span class="absolute bottom-[10px] left-[15px] right-[15px] h-[2px] bg-red-600 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></span>
            </a>
            <a href="/cart" class="flex items-center text-gray-600 font-semibold text-sm tracking-wide transition-colors duration-200 hover:text-red-600 border-[20px] border-x-[15px] border-transparent relative group">
                Cart
                <span class="absolute bottom-[10px] left-[15px] right-[15px] h-[2px] bg-red-600 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></span>
            </a>
        </nav>
        
        <div class="md:hidden grow"></div>
        
        <div class="flex items-stretch">
            {% if request.user.is_authenticated %}
            <a href="/profile" class="font-semibold text-sm text-gray-700 flex justify-center items-center cursor-pointer transition-colors duration-200 hover:text-red-600 border-y-[15px] border-x-[15px] md:border-x-[30px] border-transparent">
                <i class="far fa-user mr-[6px] hidden md:inline"></i> PROFILE
            </a>
            {% else %}
            <a href="{% url 'login_view' %}" class="font-semibold text-sm text-gray-700 flex justify-center items-center cursor-pointer transition-colors duration-200 hover:text-red-600 border-y-[15px] border-x-[15px] md:border-x-[30px] border-transparent">
                <i class="far fa-user mr-[6px] hidden md:inline"></i> LOGIN
            </a>
            {% endif %}
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="grow w-full border-b-[60px] md:border-b-0 border-transparent bg-[#fafafa]">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER (Minimal) -->
    <footer class="flex flex-col md:flex-row border-t-[1px] border-gray-200 bg-white items-center justify-between w-full mt-auto mb-[55px] md:mb-0 text-sm text-gray-500">
        <div class="border-y-[20px] border-x-[15px] md:border-x-[30px] border-transparent text-center md:text-left">
            &copy; 2026 Bata Store. All rights reserved.
        </div>
        <div class="flex border-y-[10px] md:border-y-[20px] border-x-[15px] md:border-x-[30px] border-transparent gap-[20px] justify-center text-xs">
            <a href="#" class="hover:text-red-600 transition-colors">Privacy</a>
            <a href="#" class="hover:text-red-600 transition-colors">Terms</a>
            <a href="#" class="hover:text-red-600 transition-colors">Contact</a>
        </div>
    </footer>

    <!-- MOBILE BOTTOM NAVIGATION (Compact) -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 w-full bg-white border-t-[1px] border-gray-200 z-[60] flex flex-row items-stretch justify-between pb-safe shadow-[0_-2px_10px_rgba(0,0,0,0.02)] h-[55px]">
        <a href="/" class="flex flex-col grow justify-center items-center text-gray-400 hover:text-red-600 transition-colors font-medium text-[10px]">
            <i class="fas fa-home text-lg mb-[2px]"></i>
            <span class="border-t-[2px] border-transparent">Home</span>
        </a>
        <a href="/search" class="flex flex-col grow justify-center items-center text-gray-400 hover:text-red-600 transition-colors font-medium text-[10px]">
            <i class="fas fa-search text-lg mb-[2px]"></i>
            <span class="border-t-[2px] border-transparent">Search</span>
        </a>
        <a href="/cart" class="relative flex flex-col grow justify-center items-center text-gray-400 hover:text-red-600 transition-colors font-medium text-[10px]">
            <div class="absolute top-[5px] right-[25%] w-[14px] h-[14px] bg-red-600 rounded-full flex justify-center items-center text-white text-[8px] font-bold border-[1px] border-white">
                3
            </div>
            <i class="fas fa-shopping-bag text-lg mb-[2px]"></i>
            <span class="border-t-[2px] border-transparent">Cart</span>
        </a>
        {% if request.user.is_authenticated %}
        <a href="/profile" class="flex flex-col grow justify-center items-center text-gray-400 hover:text-red-600 transition-colors font-medium text-[10px]">
            <i class="far fa-user text-lg mb-[2px]"></i>
            <span class="border-t-[2px] border-transparent">Profile</span>
        </a>
        {% else %}
        <a href="{% url 'login_view' %}" class="flex flex-col grow justify-center items-center text-gray-400 hover:text-red-600 transition-colors font-medium text-[10px]">
            <i class="fas fa-sign-in-alt text-lg mb-[2px]"></i>
            <span class="border-t-[2px] border-transparent">Login</span>
        </a>
        {% endif %}
    </div>
    
</body>
</html>
