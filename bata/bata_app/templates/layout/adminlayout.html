<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bata Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-[#f9fafb] text-gray-800 antialiased min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-full md:w-[250px] bg-white border-b-[1px] md:border-b-0 md:border-r-[1px] border-gray-200 shrink-0 sticky top-0 md:h-screen md:overflow-y-auto z-20">
        <div class="h-full flex flex-col border-[20px] border-transparent">
            
            <!-- Logo -->
            <a href="{% url 'admin_dashboard' %}" class="block mb-[30px] border-b-[1px] border-gray-100 pb-[20px]">
                <h1 class="text-3xl font-black tracking-tighter text-red-600 leading-none">BATA<span class="text-[10px] text-gray-400 block tracking-widest uppercase font-bold mt-[2px]">Admin Portal</span></h1>
            </a>
            
            <!-- Navigation -->
            <nav class="flex flex-col gap-[5px] grow">
                <a href="{% url 'admin_dashboard' %}" class="flex items-center text-sm font-bold {% if request.path == '/admin/' %}text-red-600 bg-red-50{% else %}text-gray-500 hover:text-red-600 hover:bg-gray-50{% endif %} transition-colors rounded-sm border-x-[15px] border-y-[10px] border-transparent">
                    <i class="fas fa-home w-[20px] mr-[10px]"></i> Dashboard
                </a>
                
                <p class="text-[10px] font-black uppercase text-gray-400 tracking-widest mt-[15px] mb-[5px] pl-[15px]">Inventory</p>
                <a href="{% url 'admin_colors' %}" class="flex items-center text-sm font-bold {% if '/admin/colors/' in request.path %}text-red-600 bg-red-50{% else %}text-gray-500 hover:text-red-600 hover:bg-gray-50{% endif %} transition-colors rounded-sm border-x-[15px] border-y-[10px] border-transparent">
                    <i class="fas fa-palette w-[20px] mr-[10px]"></i> Colors
                </a>
                <a href="{% url 'admin_sizes' %}" class="flex items-center text-sm font-bold {% if '/admin/sizes/' in request.path %}text-red-600 bg-red-50{% else %}text-gray-500 hover:text-red-600 hover:bg-gray-50{% endif %} transition-colors rounded-sm border-x-[15px] border-y-[10px] border-transparent">
                    <i class="fas fa-ruler w-[20px] mr-[10px]"></i> Sizes
                </a>
                <a href="{% url 'admin_categories' %}" class="flex items-center text-sm font-bold {% if '/admin/categories/' in request.path %}text-red-600 bg-red-50{% else %}text-gray-500 hover:text-red-600 hover:bg-gray-50{% endif %} transition-colors rounded-sm border-x-[15px] border-y-[10px] border-transparent">
                    <i class="fas fa-list w-[20px] mr-[10px]"></i> Categories
                </a>
                <a href="{% url 'admin_products' %}" class="flex items-center text-sm font-bold {% if '/admin/products/' in request.path %}text-red-600 bg-red-50{% else %}text-gray-500 hover:text-red-600 hover:bg-gray-50{% endif %} transition-colors rounded-sm border-x-[15px] border-y-[10px] border-transparent">
                    <i class="fas fa-shoe-prints w-[20px] mr-[10px]"></i> Products
                </a>
            </nav>
            
            <!-- Bottom Action -->
            <div class="mt-auto border-t-[1px] border-gray-100 pt-[20px]">
                <a href="/" target="_blank" class="flex items-center text-xs font-bold text-gray-400 hover:text-gray-800 transition-colors border-x-[15px] border-transparent">
                    <i class="fas fa-external-link-alt w-[20px] mr-[5px]"></i> View Public Site
                </a>
            </div>
            
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto">
        <!-- Topbar -->
        <header class="bg-white border-b-[1px] border-gray-200 sticky top-0 z-10 hidden md:flex min-h-[60px]">
            <div class="border-[15px] border-transparent flex justify-between items-center w-full">
                <h2 class="text-sm font-black text-gray-800 uppercase tracking-widest select-none">{% block page_title %}Dashboard{% endblock %}</h2>
                <div class="flex items-center gap-[20px]">
                    <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">Admin Mode</span>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="border-[20px] md:border-[30px] border-transparent flex-1 flex flex-col">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
